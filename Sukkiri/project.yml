name: Sukkiri
options:
  bundleIdPrefix: com.kaiji417
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  Sukkiri:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sukkiri
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kaiji417.sukkiri
        INFOPLIST_FILE: Sukkiri/Info.plist
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "スクリーンショットを整理するために写真へのアクセスが必要です"
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "写真ライブラリへの書き込みに使用します"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
